name: pipeline_convconv1

cores:
  0: ./cores/tpu_like.yaml   # compute A
  1: ./cores/simd.yaml       # SIMD unit
  2: ./cores/tpu_like2.yaml   # compute B
  3: ./cores/simd2.yaml       # SIMD unit
  4: ./cores/offchip.yaml    # DRAM controller
offchip_core_id: 4     # core that fronts external memory
unit_energy_cost: 0    # default energy for core_connectivity

core_connectivity:
  - type: link
    cores: [0, 1]
    bandwidth: 32
  - type: link
    cores: [1, 2]
    bandwidth: 32
  - type: link
    cores: [2, 3]
    bandwidth: 32
  # ───── Shared bus to off-chip memory (all cores ↔ DRAM) ─────
  - type: bus
    cores: [0, 1, 2, 3, 4]
    bandwidth: 128        # wider than on-chip point-to-point links
